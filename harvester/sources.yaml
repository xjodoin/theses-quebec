# Quebec institutional repositories — all speak OAI-PMH 2.0.
# We harvest oai_dc and filter by dc:type=Thesis on ingest.
#
# Two platforms dominate Quebec:
#   - EPrints: /cgi/oai2  (UQAM, UQTR, UQAC, UQAR, UQO, UQAT, INRS, ÉTS, R-Libre, Concordia)
#   - DSpace 7 / Scholaris: /server/oai/request  (UdeM, Bishop's, Sherbrooke)

