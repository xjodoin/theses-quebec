name: Deploy to GitHub Pages

# Construit le site statique (SQLite → Pagefind chunks → dist/) et le
# déploie sur GitHub Pages. Se déclenche :
#   - à chaque push sur main qui touche au code source
#   - à chaque release `db-*` publiée (le harvest hebdomadaire publie une
#     nouvelle release → redéploie)
#   - manuellement via l'onglet Actions

on:
  push:
    branches: [main]
    paths:
      - "scripts/build.mjs"
      - "scripts/fetch_db.mjs"
      - "web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install zstd
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zstd

      - name: Fetch DB from latest release
        env:
          # gh CLI is preinstalled on ubuntu-latest; GITHUB_TOKEN suffices
          # for downloads from the same repo.
          GH_TOKEN: ${{ github.token }}
        run: npm run db:fetch

      - name: Build static site
        # Pagefind's writeFiles holds the entire index in memory while serializing
        # 187k+ records to ~840 MB of .pf_index chunks. Default Node heap (~4 GB
        # on a 16 GB runner) sits right at the edge and the process was getting
        # OOM-killed mid-write. Bump the old-space cap so the runner's headroom
        # is what bounds us, not V8.
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
