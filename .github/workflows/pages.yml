name: Deploy to GitHub Pages

# `scripts/deploy.mjs` can build dist/ locally, upload the tar.gz as a
# `pages-*` release asset, then trigger this workflow with the release tag
# as input. Without a tag, the workflow builds tqsearch from main directly.
#
# We use workflow_dispatch (not `release: published`) because
# release-event workflows run on the tag ref; the github-pages
# environment's default protection rule only permits deployments from
# the default branch, so tag-ref runs get rejected. workflow_dispatch
# always runs on the default branch.
#
# Repo setup:
#   Settings → Pages → Source: "GitHub Actions"

on:
  push:
    branches: [main]
    paths:
      - "data/theses.db"
      - "web/**"
      - "scripts/**"
      - "package*.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag to deploy (e.g. pages-2026-04-29-2030); blank builds from main"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download release asset
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'dist.tar.gz' \
            --pattern 'dist.tar.gz.sha256'

      - name: Verify checksum
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
        run: sha256sum -c dist.tar.gz.sha256

      - name: Stage as Pages artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
        # actions/deploy-pages consumes an artifact named "github-pages"
        # containing a single *uncompressed* tar called "artifact.tar"
        # (matches what actions/upload-pages-artifact produces). We ship
        # gzipped over the wire to halve the upload, then gunzip here without
        # extracting the static search shard tree on the runner.
        run: |
          mkdir -p _pages
          gunzip -c dist.tar.gz > _pages/artifact.tar

      - name: Upload Pages artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: _pages/artifact.tar
          retention-days: 1

      - name: Checkout
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.tag != '') }}
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.tag != '') }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.tag != '') }}
        run: npm ci

      - name: Build tqsearch site
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.tag != '') }}
        run: npm run build

      - name: Upload built Pages artifact
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.tag != '') }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
