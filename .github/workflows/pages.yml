name: Deploy to GitHub Pages

# `scripts/deploy.mjs` builds dist/ locally (Pagefind's 187k-file
# writeFiles stalls on GHA shared disk), uploads the tar.gz as a
# `pages-*` release asset, then triggers this workflow with the release
# tag as input. The workflow downloads the asset and hands it to
# actions/deploy-pages.
#
# We use workflow_dispatch (not `release: published`) because
# release-event workflows run on the tag ref; the github-pages
# environment's default protection rule only permits deployments from
# the default branch, so tag-ref runs get rejected. workflow_dispatch
# always runs on the default branch.
#
# Repo setup:
#   Settings → Pages → Source: "GitHub Actions"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. pages-2026-04-29-2030)"
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'dist.tar.gz' \
            --pattern 'dist.tar.gz.sha256'

      - name: Verify checksum
        run: sha256sum -c dist.tar.gz.sha256

      - name: Stage as Pages artifact
        # actions/deploy-pages consumes an artifact named "github-pages"
        # containing a single gzipped tar called "artifact.tar". Our
        # release asset is already that exact format — just rename and
        # upload, no extraction (which would defeat the whole point of
        # building locally).
        run: |
          mkdir -p _pages
          mv dist.tar.gz _pages/artifact.tar

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: _pages/artifact.tar
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
