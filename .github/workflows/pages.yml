name: Deploy to GitHub Pages

# Triggered when `scripts/deploy.mjs` publishes a `pages-*` release from
# a developer's machine. We don't build on the runner — Pagefind's
# 187k-file writeFiles stalls on shared disk (~22 min, hit the timeout).
# The release ships a pre-built tar.gz; this workflow just hands it to
# actions/deploy-pages.
#
# Repo setup:
#   Settings → Pages → Source: "GitHub Actions"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. pages-2026-04-29-2030)"
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Skip releases that aren't ours (e.g. db-*). workflow_dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'pages-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            echo "No tag resolved" >&2
            exit 1
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.tag.outputs.name }}" \
            --repo "${{ github.repository }}" \
            --pattern 'dist.tar.gz' \
            --pattern 'dist.tar.gz.sha256'

      - name: Verify checksum
        run: sha256sum -c dist.tar.gz.sha256

      - name: Stage as Pages artifact
        # actions/deploy-pages consumes an artifact named "github-pages"
        # containing a single gzipped tar called "artifact.tar". Our
        # release asset is already that exact format — just rename and
        # upload, no extraction (which would defeat the whole point of
        # building locally).
        run: |
          mkdir -p _pages
          mv dist.tar.gz _pages/artifact.tar

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: _pages/artifact.tar
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
