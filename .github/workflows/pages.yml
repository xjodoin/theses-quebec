name: Deploy to GitHub Pages

# Construit le site statique (SQLite → Pagefind chunks → dist/) et le
# déploie sur GitHub Pages. Se déclenche :
#   - à chaque push sur main qui touche au code source
#   - à chaque release `db-*` publiée (le harvest hebdomadaire publie une
#     nouvelle release → redéploie)
#   - manuellement via l'onglet Actions

on:
  push:
    branches: [main]
    paths:
      - "scripts/build.mjs"
      - "scripts/fetch_db.mjs"
      - "web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install zstd
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zstd

      - name: Fetch DB from latest release
        env:
          # gh CLI is preinstalled on ubuntu-latest; GITHUB_TOKEN suffices
          # for downloads from the same repo.
          GH_TOKEN: ${{ github.token }}
        run: npm run db:fetch

      - name: Build static site
        # Build is now I/O-bound on a single big DB copy (no per-record file
        # writes), so default Node heap is plenty and the step takes <1 min.
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
